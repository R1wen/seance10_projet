jobs:
  deploy:
    name: Build and Deploy to AWS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Connexion à AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 2. Connexion à Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build & Push Backend vers ECR
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          push: true
          # On utilise l'URL ECR récupérée dynamiquement
          tags: ${{ steps.login-ecr.outputs.registry }}/ecommerce-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Build & Push Frontend vers ECR (avec ta variable VITE_API_URL)
      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/ecommerce-frontend:latest
          # On injecte la variable pour corriger le problème localhost
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Déploiement forcé sur ECS
      - name: Update ECS services
        run: |
          aws ecs update-service --cluster ecommerce-cluster --service backend-service --force-new-deployment
          aws ecs update-service --cluster ecommerce-cluster --service frontend-service --force-new-deployment